<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🍳 Kulinaria — Пошук рецептів</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>

<!-- ─── Header ─── -->
<header class="header">
  <div class="header-inner">
    <a href="#" class="logo" onclick="goHome(); return false;">🍳 <span>Kulinaria</span></a>
    <div class="header-actions">
      <button class="btn btn-accent" onclick="showRandom()">🎲 Випадковий рецепт</button>
    </div>
  </div>
</header>

<!-- ─── Hero ─── -->
<section id="hero" class="hero">
  <div class="hero-content">
    <h1>Знайдіть <span class="highlight">ідеальний рецепт</span></h1>
    <p class="hero-sub">Пошук за назвою, інгредієнтом або категорією — понад 300 страв з усього світу</p>
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Напишіть назву страви…" autocomplete="off" />
      <button class="btn btn-primary" id="searchBtn" onclick="doSearch()">🔍 Знайти</button>
    </div>
    <div class="search-tabs">
      <button class="tab active" data-mode="name">За назвою</button>
      <button class="tab" data-mode="ingredient">За інгредієнтом</button>
    </div>
  </div>
</section>

<!-- ─── Categories ─── -->
<section id="categoriesSection" class="section">
  <div class="section-inner">
    <h2 class="section-title">📂 Категорії</h2>
    <div id="categoriesGrid" class="categories-grid"></div>
  </div>
</section>

<!-- ─── Results ─── -->
<section id="resultsSection" class="section hidden">
  <div class="section-inner">
    <div class="results-header">
      <h2 id="resultsTitle" class="section-title"></h2>
      <button class="btn btn-ghost" onclick="goHome()">← Назад</button>
    </div>
    <div id="resultsGrid" class="recipes-grid"></div>
    <p id="noResults" class="no-results hidden">😕 Нічого не знайдено. Спробуйте інший запит.</p>
  </div>
</section>

<!-- ─── Recipe Detail (modal) ─── -->
<div id="recipeModal" class="modal hidden">
  <div class="modal-backdrop" onclick="closeModal()"></div>
  <div class="modal-content">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="recipeDetail"></div>
  </div>
</div>

<!-- ─── Loading ─── -->
<div id="loader" class="loader hidden">
  <div class="spinner"></div>
  <p>Завантаження…</p>
</div>

<script src="/app.js"></script>
</body>
</html>
